<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="zt-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="zt-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background rounded square (for icon recognition at small sizes) -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="#0F0F12"/>
  <!-- Enso (zen circle), broken to feel hand-drawn -->
  <circle cx="64" cy="64" r="46" fill="none"
          stroke="url(#zt-grad)" stroke-width="8" stroke-linecap="round"
          stroke-dasharray="248 360" transform="rotate(-95 64 64)"/>
  <!-- Play triangle -->
  <polygon points="52,42 52,86 88,64" fill="url(#zt-grad)"/>
</svg>
