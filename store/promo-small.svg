<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="440" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0F12"/>
      <stop offset="100%" stop-color="#1A1A22"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="440" height="280" fill="url(#bg)"/>
  <ellipse cx="100" cy="220" rx="160" ry="120" fill="url(#glow)"/>
  <ellipse cx="380" cy="60" rx="120" ry="100" fill="#14B8A6" opacity="0.08"/>

  <!-- Logo (zen circle + play) -->
  <g transform="translate(40, 90)">
    <circle cx="0" cy="0" r="36" fill="none" stroke="url(#brand)" stroke-width="6" stroke-linecap="round" stroke-dasharray="195 280" transform="rotate(-95)"/>
    <polygon points="-9,-15 -9,15 19,0" fill="url(#brand)"/>
  </g>

  <!-- Brand name -->
  <text x="100" y="100" font-family="Inter, -apple-system, sans-serif" font-size="44" font-weight="700" letter-spacing="-1.5" fill="url(#brand)">ZenTube</text>

  <!-- Tagline -->
  <text x="100" y="135" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#F4F4F5" opacity="0.85">YouTube, but on your terms.</text>

  <!-- Feature pills -->
  <g font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#A1A1AA">
    <rect x="40" y="200" width="78" height="26" rx="13" fill="#25252F"/>
    <text x="79" y="217" text-anchor="middle">No ads</text>

    <rect x="126" y="200" width="92" height="26" rx="13" fill="#25252F"/>
    <text x="172" y="217" text-anchor="middle">Free forever</text>

    <rect x="226" y="200" width="100" height="26" rx="13" fill="#25252F"/>
    <text x="276" y="217" text-anchor="middle">No tracking</text>
  </g>
</svg>
