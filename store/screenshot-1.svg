<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="s1bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0F12"/>
      <stop offset="100%" stop-color="#1A1A22"/>
    </linearGradient>
    <linearGradient id="s1brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <radialGradient id="s1glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#s1bg)"/>
  <ellipse cx="200" cy="700" rx="500" ry="350" fill="url(#s1glow)"/>
  <ellipse cx="1100" cy="100" rx="400" ry="300" fill="#14B8A6" opacity="0.08"/>

  <!-- Headline -->
  <text x="640" y="280" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="84" font-weight="800" letter-spacing="-2.5" fill="#F4F4F5">Take YouTube back.</text>
  <text x="640" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="84" font-weight="800" letter-spacing="-2.5" fill="url(#s1brand)">One toggle.</text>

  <!-- Sub -->
  <text x="640" y="440" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#A1A1AA">Hide the feed, the recommendations, the Shorts, the comments, the counts.</text>
  <text x="640" y="472" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#A1A1AA">Whatever steals your attention — gone.</text>

  <!-- Big logo -->
  <g transform="translate(640, 620)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#s1brand)" stroke-width="10" stroke-linecap="round" stroke-dasharray="325 470" transform="rotate(-95)"/>
    <polygon points="-16,-26 -16,26 30,0" fill="url(#s1brand)"/>
  </g>

  <!-- Free forever pill -->
  <g transform="translate(550, 720)">
    <rect width="180" height="40" rx="20" fill="#25252F" stroke="#34343F" stroke-width="1"/>
    <text x="90" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#F4F4F5">✦ Free forever · No ads</text>
  </g>
</svg>
